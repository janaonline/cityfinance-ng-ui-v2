<div class="menu-wrapper d-flex align-items-start">
  <div class="layout-menu" [class.hideSidebar]="isSidebarCollapsed()">
    <ul class="layout-menu-ul layout-menu-ul-pimary">
      @for (item of model; track item.label) {
      <!-- Separator/ Divider -->
      @if (item.separator) {
      <hr />
      } @else {
      <app-menu-item [item]="item" [root]="true"></app-menu-item>
      } }
    </ul>

    <ul class="layout-menu-ul layout-menu-ul-secondary">
      @for (item of bottomModel; track item.label) {
      <!-- Separator/ Divider -->
      @if (item.separator) {
      <hr />
      } @else {
      <app-menu-item [item]="item" [root]="false"></app-menu-item>
      } }
    </ul>
  </div>
  <button
    class="sidebar-toggle border-0 rounded-end px-2 py-0 m-0"
    [title]="isSidebarCollapsed() ? 'Show Sidebar' : 'Hide Sidebar'"
    (click)="toggleSidebar()"
  >
    <i
      class="bi fs-5"
      [class.bi-layout-sidebar-inset]="!isSidebarCollapsed()"
      [class.bi-layout-sidebar-inset-reverse]="isSidebarCollapsed()"
    ></i>
  </button>
</div>

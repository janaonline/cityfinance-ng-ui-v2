<section class="vh-100">
  <div class="container py-5 h-100">
    <div class="row d-flex align-items-center justify-content-center h-100">
      <!-- <div class="col-md-8 col-lg-7 col-xl-6">
        <img
          src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.svg"
          class="img-fluid"
          alt="Login illustration"
        />
      </div> -->
      <div class="col-md-7 col-lg-5 col-xl-5 offset-xl-1">
        <form (ngSubmit)="submitLogin()" #loginForm="ngForm">
          <div class="mb-4">
            <h2 class="fw-bold mb-1">Sign in</h2>
            <p class="text-muted mb-0">Use your Cityfinance account to continue.</p>
          </div>

          <div *ngIf="infoMessage" class="alert alert-info" role="alert">
            {{ infoMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <div class="form-outline mb-4">
            <input
              type="text"
              id="loginIdentifier"
              class="form-control form-control-lg"
              [(ngModel)]="credentials.identifier"
              name="identifier"
              required
              autocomplete="username"
            />
            <label class="form-label" for="loginIdentifier">Email or census code</label>
          </div>

          <div class="form-outline mb-4">
            <input
              type="password"
              id="loginPassword"
              class="form-control form-control-lg"
              [(ngModel)]="credentials.password"
              name="password"
              required
              autocomplete="current-password"
            />
            <label class="form-label" for="loginPassword">Password</label>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-lg btn-block w-100"
            [disabled]="isSubmitting || loginForm.invalid"
          >
            {{ isSubmitting ? 'Signing in...' : 'Sign in' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>

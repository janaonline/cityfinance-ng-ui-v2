<div class="year-overlay">
  <div class="year-card">
    <div class="year-card__header">
      <p class="tag">16th Finance Commission · Grant Portal</p>
      <h2>Select Financial Year</h2>
      <p class="subtitle">Choose a year to access grant data and submissions.</p>
    </div>

    <div class="year-card__body">
      @if (isLoading()) {
        <div class="skeleton-active"></div>
        <div class="skeleton-grid">
          @for (i of [1, 2, 3, 4]; track i) {
            <div class="skeleton-tile"></div>
          }
        </div>
        <div class="skeleton-btn"></div>
      } @else {
        <p class="section-label">Currently Open</p>

        <label class="year-active-tile" [class.year-active-tile--selected]="selectedYear() === activeYear()">
          <input
            type="radio"
            name="financialYear"
            [value]="activeYear()"
            [checked]="selectedYear() === activeYear()"
            (change)="selectYear(activeYear())"
          />
          <div class="year-active-tile__inner">
            <div class="year-active-tile__left">
              <span class="year-active-tile__year">{{ activeYear() }}</span>
              <span class="year-active-tile__sub">Financial Year</span>
            </div>
            <div class="year-active-tile__right">
              <span class="badge-live">
                <span class="badge-live__dot"></span>
                Live
              </span>
              <div class="year-active-tile__radio">
                @if (selectedYear() === activeYear()) {
                  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="10" cy="10" r="9" fill="#1d6f73" />
                    <path d="M6 10.5l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                } @else {
                  <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="10" cy="10" r="9" stroke="#9fc2c7" stroke-width="1.5" />
                  </svg>
                }
              </div>
            </div>
          </div>
        </label>

        <p class="section-label section-label--upcoming">Upcoming Years</p>

        <div class="upcoming-grid">
          @for (year of upcomingYears(); track year) {
            <div class="year-locked-tile">
              <svg class="lock-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="7" width="10" height="8" rx="2" stroke="#b0c4c6" stroke-width="1.4"/>
                <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="#b0c4c6" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <span class="year-locked-tile__year">{{ year }}</span>
              <span class="badge-soon">Soon</span>
            </div>
          }
        </div>

        <button class="continue-btn" type="button" (click)="continue()" [disabled]="!selectedYear()">
          Continue
          <svg class="btn-arrow" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 10h12M11 5l5 5-5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      }
    </div>
  </div>
</div>

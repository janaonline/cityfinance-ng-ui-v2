<div class="container-fluid px-3 px-md-4 px-xl-5 py-4">
  <div class="sh-page-header mb-3">
    <h1 class="sh-page-title mb-1">Support Hours</h1>
    <p class="sh-page-subtitle mb-0">
      Drop in to ask questions about grant submissions, financial statements, or validations.
      Members from the Product and PMU teams are available to help.
    </p>
  </div>

  <app-support-hours-card
    [nextSupportHour]="nextSupportHour()"
    [upcomingSupportHours]="upcomingSupportHours()"
    [isLoading]="isLoading()"
    [errorMessage]="errorMessage()"
  />
</div>

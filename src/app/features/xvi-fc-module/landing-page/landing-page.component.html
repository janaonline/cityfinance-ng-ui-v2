<section class="min-vh-100 d-flex align-items-center justify-content-center px-3 py-4">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="bg-white rounded-4 shadow-lg p-4 p-md-5">
          <p class="text-uppercase fw-bold small mb-3">XVI Financial Commission</p>
          <h1 class="display-6 fw-bold mb-3">Choose a workspace</h1>
          <p class="fs-6 mb-3 mb-md-4 opacity-75">
            Select your role to access your dashboard and continue your workflow.
          </p>

          <div class="row g-3 mb-4">
            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold" for="xvifc-year-select">Select year</label>
              <select
                id="xvifc-year-select"
                class="form-select"
                #yearSelect
                (change)="updateSelectedYear(yearSelect.value)"
              >
                <option value="">Choose a year</option>
                @for (yearId of availableYearIds; track yearId) {
                  <option [value]="yearId">{{ yearId }}</option>
                }
              </select>
            </div>
            <div class="col-12">
              <p class="small text-muted mb-0">Select a year before opening a workspace.</p>
            </div>
          </div>

          <div class="row g-4">
            @for (option of roleOptions(); track option.label) {
              <div class="col-12 col-md-6">
                <a
                  class="card workspace-card h-100 text-decoration-none"
                  [routerLink]="option.routerLink"
                  [class.workspace-disabled]="option.isDisabled"
                  [attr.aria-disabled]="option.isDisabled"
                >
                  <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                      <h2 class="h5 fw-semibold mb-0">
                        {{ option.label }}
                      </h2>
                    </div>
                    <p class="mb-0 text-muted">
                      {{ option.description }}
                    </p>
                  </div>
                </a>
              </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
